      --surface2: #181d2e;
      --border: #222840;
      --text: #dde4f0;
      --text-dim: #6b7a99;
      --znято: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      min-height: 100vh;
      background-image: radial-gradient(ellipse 90% 35% at 50% 0%, rgba(59,130,246,0.07) 0%, transparent 65%);
    }
    .header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(10,13,20,0.93);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 12px;
    }
    .header-title {
      font-family: 'Unbounded', sans-serif;
      font-weight: 600; font-size: 12px;
      letter-spacing: 0.13em; color: var(--text-dim);
      text-transform: uppercase; margin-bottom: 10px;
    }
    .header-title span { color: var(--accent); }
    .search-wrap { position: relative; }
    .search-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim); pointer-events: none;
    }
    #searchInput {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 40px 10px 38px;
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      font-size: 15px; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    #searchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    #searchInput::placeholder { color: var(--text-dim); }
    #clearBtn {
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--text-dim); cursor: pointer;
      padding: 4px; border-radius: 50%;
      display: none; line-height: 1;
      transition: color .15s; font-size: 14px;
    }
    #clearBtn:hover { color: var(--text); }
    .stats-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 16px;
      font-size: 12px; color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .stats-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; color: var(--accent); font-weight: 700;
    }
    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 6px; padding: 3px 10px;
      font-size: 11px; cursor: pointer;
      transition: all .15s;
      font-family: 'Manrope', sans-serif;
    }
    .filter-btn.active-znato, .filter-btn.active-znato:hover {
      border-color: var(--znято); color: var(--znято);
    }
    .filter-btn.active-upo, .filter-btn.active-upo:hover {
      border-color: var(--accent2); color: var(--accent2);
    }
    .filter-btn:not(.active-znato):not(.active-upo):hover {
      border-color: #4a5580; color: var(--text);
    }
    #cardList {
      padding: 12px 12px 50px;
      display: flex; flex-direction: column; gap: 7px;
      max-width: 680px; margin: 0 auto;
    }
    .section-header {
      font-family: 'Unbounded', sans-serif;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 8px 12px;
      border-radius: 8px;
      margin-top: 6px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-header.gaisyn {
      color: var(--accent);
      background: rgba(59,130,246,0.08);
      border: 1px solid rgba(59,130,246,0.2);
    }
    .section-header.upo {
      color: var(--accent2);
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.2);
    }
    .section-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; opacity: 0.7;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex; gap: 11px;
      align-items: flex-start;
      transition: border-color .15s, background .15s, transform .15s;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute;
      left: 0; top: 0; bottom: 0; width: 3px;
      background: transparent;
      transition: background .2s;
    }
    .card:hover {
      border-color: #2e3a55;
      background: var(--surface2);
      transform: translateY(-1px);
    }
    .card.highlighted {
      border-color: var(--accent);
      background: rgba(59,130,246,0.06);
      box-shadow: 0 0 0 1px rgba(59,130,246,0.25), 0 4px 18px rgba(59,130,246,0.1);
    }
    .card.highlighted::before { background: var(--accent); }
    .card.upo-card::before { background: rgba(245,158,11,0.5); }
    .card.znято { opacity: 0.55; }
    .card.znято::before { background: var(--znято) !important; }
    .card.znято .card-title {
      text-decoration: line-through;
      text-decoration-color: rgba(239,68,68,0.45);
    }
    .card-seq {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--text-dim);
      min-width: 24px; padding-top: 3px; text-align: right;
    }
    .card-body { flex: 1; min-width: 0; }
    .card-top {
      display: flex; align-items: center;
      gap: 8px; flex-wrap: wrap; margin-bottom: 3px;
    }
    .card-code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px; font-weight: 700;
      color: var(--accent); letter-spacing: .05em;
      background: rgba(59,130,246,0.1);
      padding: 1px 7px; border-radius: 5px;
      border: 1px solid rgba(59,130,246,0.22);
      flex-shrink: 0;
    }
    .card-code.upo-code {
      color: var(--accent2);
      background: rgba(245,158,11,0.1);
      border-color: rgba(245,158,11,0.25);
    }
    .card-title {
      font-size: 13.5px; font-weight: 600;
      color: var(--text);
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-desc {
      font-size: 11.5px; color: var(--text-dim); margin-top: 2px;
    }
    .card-status { flex-shrink: 0; padding-top: 2px; }
    .badge-znято {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px; font-weight: 600;
      letter-spacing: .07em;
      color: var(--znято);
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.28);
      border-radius: 5px; padding: 2px 7px;
    }
    .badge-note {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; color: var(--text-dim);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 5px; padding: 2px 6px;
    }
    mark {
      background: rgba(59,130,246,0.28);
      color: inherit; border-radius: 2px; padding: 0 1px;
    }
    #emptyState {
      display: none; text-align: center;
      padding: 60px 20px; color: var(--text-dim);
    }
    #emptyState .empty-icon { font-size: 38px; margin-bottom: 12px; }
    #emptyState p { font-size: 14px; }
    .card { scroll-margin-top: 115px; }
    @media (min-width: 480px) {
      .card-title { font-size: 14.5px; }
      .card-code { font-size: 15px; }
    }
  </style>
</head>

  const clearBtn   = document.getElementById('clearBtn');
  const listEl     = document.getElementById('cardList');
  const emptyState = document.getElementById('emptyState');
  const countEl    = document.getElementById('countDisplay');
  const totalLabel = document.getElementById('totalLabel');
  const filterZnatoBtn  = document.getElementById('filterZnato');
  const filterUpoBtn    = document.getElementById('filterUpo');
  const filterGaisynBtn = document.getElementById('filterGaisyn');

  let filterZnato  = false;
  let filterUpo    = false;
  let filterGaisyn = false;
  let debounceTimer = null;

  const TOTAL = gaisyn.length + upo.length;
  totalLabel.textContent = 'із ' + TOTAL;

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function hlText(text, q) {
    if (!q) return escHtml(text);
    const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
    return escHtml(text).replace(re, '<mark>$1</mark>');
  }
  function isZnato(item) {
    return item.note && item.note.toLowerCase().includes('знято');
  }

  function matchItem(item, q) {
    if (!q) return true;
    return item.code.toLowerCase().includes(q) ||
           item.title.toLowerCase().includes(q) ||
           item.desc.toLowerCase().includes(q) ||
           item.note.toLowerCase().includes(q);
  }

  function makeCard(item, q, isUpo) {
    const znato = isZnato(item);
    const classes = ['card'];
    if (znato) classes.push('znято');
    if (isUpo) classes.push('upo-card');

    const statusHTML = znato
      ? `<div class="card-status"><span class="badge-znято">Знято</span></div>`
      : (item.note ? `<div class="card-status"><span class="badge-note">${escHtml(item.note)}</span></div>` : '');

    const card = document.createElement('div');
    card.className = classes.join(' ');
    card.innerHTML = `
      <div class="card-seq">${item.num}</div>
      <div class="card-body">
        <div class="card-top">
          <span class="card-code${isUpo ? ' upo-code' : ''}">${hlText(item.code, q)}</span>
          <span class="card-title">${hlText(item.title, q)}</span>
        </div>
        ${item.desc ? `<div class="card-desc">${hlText(item.desc, q)}</div>` : ''}
      </div>
      ${statusHTML}
    `;
    return card;
  }

  function renderCards(query) {
    const q = query.trim().toLowerCase();
    const fragment = document.createDocumentFragment();
    let visible = 0;

    const showGaisyn = !filterUpo;
    const showUpo    = !filterGaisyn;

    if (showGaisyn) {
      const filtered = gaisyn.filter(item => {
        if (filterZnato && !isZnato(item)) return false;
        return matchItem(item, q);
      });
      if (filtered.length > 0) {
        const hdr = document.createElement('div');
        hdr.className = 'section-header gaisyn';
        hdr.innerHTML = `📋 Гайсин <span class="section-count">(${filtered.length})</span>`;
        fragment.appendChild(hdr);
        filtered.forEach(item => {
          fragment.appendChild(makeCard(item, q, false));
          visible++;
        });
      }
    }

    if (showUpo) {
      const filtered = upo.filter(item => {
        if (filterZnato && !isZnato(item)) return false;
        return matchItem(item, q);
      });
      if (filtered.length > 0) {
        const hdr = document.createElement('div');
        hdr.className = 'section-header upo';
        hdr.innerHTML = `⭐ УПО <span class="section-count">(${filtered.length})</span>`;
        fragment.appendChild(hdr);
        filtered.forEach(item => {
          fragment.appendChild(makeCard(item, q, true));
          visible++;
        });
      }
    }

    listEl.innerHTML = '';
    listEl.appendChild(fragment);
    countEl.textContent = visible;
    const empty = visible === 0;
    emptyState.style.display = empty ? 'block' : 'none';
    listEl.style.display = empty ? 'none' : 'flex';
  }

  input.addEventListener('input', () => {
    clearBtn.style.display = input.value ? 'block' : 'none';
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => renderCards(input.value), 80);
  });
  clearBtn.addEventListener('click', () => {
    input.value = '';
    clearBtn.style.display = 'none';
    renderCards('');
    input.focus();
  });
  filterZnatoBtn.addEventListener('click', () => {
    filterZnato = !filterZnato;
    filterZnatoBtn.classList.toggle('active-znato', filterZnato);
    filterZnatoBtn.textContent = filterZnato ? '✕ Знято' : 'Тільки «Знято»';
    renderCards(input.value);
  });
  filterUpoBtn.addEventListener('click', () => {
    filterUpo = !filterUpo;
    if (filterUpo) filterGaisyn = false;
    filterUpoBtn.classList.toggle('active-upo', filterUpo);
    filterGaisynBtn.classList.remove('active-upo');
    filterUpoBtn.textContent = filterUpo ? '✕ УПО' : 'Тільки УПО';
    filterGaisynBtn.textContent = 'Тільки Гайсин';
    renderCards(input.value);
  });
  filterGaisynBtn.addEventListener('click', () => {
    filterGaisyn = !filterGaisyn;
    if (filterGaisyn) filterUpo = false;
    filterGaisynBtn.classList.toggle('active-upo', filterGaisyn);
    filterUpoBtn.classList.remove('active-upo');
    filterGaisynBtn.textContent = filterGaisyn ? '✕ Гайсин' : 'Тільки Гайсин';
    filterUpoBtn.textContent = 'Тільки УПО';
    renderCards(input.value);
  });

  renderCards('');
  </script>
</body>
</html>
