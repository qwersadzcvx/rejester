<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Реєстр орендарів</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Unbounded:wght@300;400;600&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --accent: #3b82f6;
      --bg: #0a0d14;
      --surface: #111520;
      --surface2: #181d2e;
      --border: #222840;
      --text: #dde4f0;
      --text-dim: #6b7a99;
      --znято: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      min-height: 100vh;
      background-image: radial-gradient(ellipse 90% 35% at 50% 0%, rgba(59,130,246,0.07) 0%, transparent 65%);
    }

    .header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(10,13,20,0.93);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 12px;
    }
    .header-title {
      font-family: 'Unbounded', sans-serif;
      font-weight: 600; font-size: 12px;
      letter-spacing: 0.13em; color: var(--text-dim);
      text-transform: uppercase; margin-bottom: 10px;
    }
    .header-title span { color: var(--accent); }

    .search-wrap { position: relative; }
    .search-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim); pointer-events: none;
    }
    #searchInput {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 40px 10px 38px;
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      font-size: 15px; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    #searchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    #searchInput::placeholder { color: var(--text-dim); }
    #clearBtn {
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--text-dim); cursor: pointer;
      padding: 4px; border-radius: 50%;
      display: none; line-height: 1;
      transition: color .15s; font-size: 14px;
    }
    #clearBtn:hover { color: var(--text); }

    .stats-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 16px;
      font-size: 12px; color: var(--text-dim);
      border-bottom: 1px solid var(--border);
    }
    .stats-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; color: var(--accent); font-weight: 700;
    }
    .filter-btn {
      margin-left: auto;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 6px; padding: 3px 10px;
      font-size: 11px; cursor: pointer;
      transition: all .15s;
      font-family: 'Manrope', sans-serif;
    }
    .filter-btn.active, .filter-btn:hover {
      border-color: var(--znято); color: var(--znято);
    }

    #cardList {
      padding: 12px 12px 50px;
      display: flex; flex-direction: column; gap: 7px;
      max-width: 680px; margin: 0 auto;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex; gap: 11px;
      align-items: flex-start;
      transition: border-color .15s, background .15s, transform .15s;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute;
      left: 0; top: 0; bottom: 0; width: 3px;
      background: transparent;
      transition: background .2s;
    }
    .card:hover {
      border-color: #2e3a55;
      background: var(--surface2);
      transform: translateY(-1px);
    }
    .card.highlighted {
      border-color: var(--accent);
      background: rgba(59,130,246,0.06);
      box-shadow: 0 0 0 1px rgba(59,130,246,0.25), 0 4px 18px rgba(59,130,246,0.1);
    }
    .card.highlighted::before { background: var(--accent); }
    .card.znято { opacity: 0.55; }
    .card.znято::before { background: var(--znято); }
    .card.znято .card-title {
      text-decoration: line-through;
      text-decoration-color: rgba(239,68,68,0.45);
    }

    .card-seq {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--text-dim);
      min-width: 24px; padding-top: 3px; text-align: right;
    }
    .card-body { flex: 1; min-width: 0; }
    .card-top {
      display: flex; align-items: center;
      gap: 8px; flex-wrap: wrap; margin-bottom: 3px;
    }
    .card-code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px; font-weight: 700;
      color: var(--accent); letter-spacing: .05em;
      background: rgba(59,130,246,0.1);
      padding: 1px 7px; border-radius: 5px;
      border: 1px solid rgba(59,130,246,0.22);
      flex-shrink: 0;
    }
    .card-title {
      font-size: 13.5px; font-weight: 600;
      color: var(--text);
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-desc {
      font-size: 11.5px; color: var(--text-dim); margin-top: 2px;
    }
    .card-status { flex-shrink: 0; padding-top: 2px; }
    .badge-znято {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px; font-weight: 600;
      letter-spacing: .07em;
      color: var(--znято);
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.28);
      border-radius: 5px; padding: 2px 7px;
    }
    .badge-note {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; color: var(--text-dim);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 5px; padding: 2px 6px;
    }

    mark {
      background: rgba(59,130,246,0.28);
      color: inherit; border-radius: 2px; padding: 0 1px;
    }

    #emptyState {
      display: none; text-align: center;
      padding: 60px 20px; color: var(--text-dim);
    }
    #emptyState .empty-icon { font-size: 38px; margin-bottom: 12px; }
    #emptyState p { font-size: 14px; }

    .card { scroll-margin-top: 115px; }

    @media (min-width: 480px) {
      .card-title { font-size: 14.5px; }
      .card-code { font-size: 15px; }
    }
  </style>
</head>

  const TOTAL = data.length;
  const input      = document.getElementById('searchInput');
  const clearBtn   = document.getElementById('clearBtn');
  const listEl     = document.getElementById('cardList');
  const emptyState = document.getElementById('emptyState');
  const countEl    = document.getElementById('countDisplay');
  const totalLabel = document.getElementById('totalLabel');
  const filterBtn  = document.getElementById('filterZnato');
  const filterUpoBtn = document.getElementById('filterUpo');

  let filterZnatoActive = false;
  let filterUpoActive = false;
  let debounceTimer = null;

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function hlText(text, q) {
    if (!q) return escHtml(text);
    const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
    return escHtml(text).replace(re, '<mark>$1</mark>');
  }

  function isZnato(item) { return item.status === 'Знято'; }

  function renderCards(query, onlyZnato, onlyUpo) {
    const q = query.trim().toLowerCase();
    const fragment = document.createDocumentFragment();
    let visible = 0;
    let firstHighlight = null;

    data.forEach(item => {
      const codeMatch  = item.code.toLowerCase().includes(q);
      const titleMatch = item.title.toLowerCase().includes(q);
      const descMatch  = item.description.toLowerCase().includes(q);
      const statusMatch = item.status.toLowerCase().includes(q);
      const matches    = !q || codeMatch || titleMatch || descMatch || statusMatch;
      const passZnato  = !onlyZnato || isZnato(item);
      const passUpo    = !onlyUpo || item.status === 'УПО';
      if (!matches || !passZnato || !passUpo) return;
      visible++;

      const znato = isZnato(item);
      const isHighlighted = q && codeMatch && !firstHighlight;

      const card = document.createElement('div');
      card.className = 'card' + (znato ? ' znято' : '') + (isHighlighted ? ' highlighted' : '');

      if (isHighlighted) firstHighlight = card;

      const statusHTML = znato
        ? `<div class="card-status"><span class="badge-znято">Знято</span></div>`
        : (item.status
            ? `<div class="card-status"><span class="badge-note">${escHtml(item.status)}</span></div>`
            : '');

      card.innerHTML = `
        <div class="card-seq">${item.id_num}</div>
        <div class="card-body">
          <div class="card-top">
            <span class="card-code">${hlText(item.code, q)}</span>
            <span class="card-title">${hlText(item.title, q)}</span>
          </div>
          ${item.description ? `<div class="card-desc">${hlText(item.description, q)}</div>` : ''}
        </div>
        ${statusHTML}
      `;
      fragment.appendChild(card);
    });

    listEl.innerHTML = '';
    listEl.appendChild(fragment);

    countEl.textContent = visible;
    const empty = visible === 0;
    emptyState.style.display = empty ? 'block' : 'none';
    listEl.style.display = empty ? 'none' : 'flex';

    if (firstHighlight) {
      requestAnimationFrame(() =>
        firstHighlight.scrollIntoView({ behavior: 'smooth', block: 'center' })
      );
    }
  }

  input.addEventListener('input', () => {
    clearBtn.style.display = input.value ? 'block' : 'none';
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => renderCards(input.value, filterZnatoActive, filterUpoActive), 80);
  });

  clearBtn.addEventListener('click', () => {
    input.value = '';
    clearBtn.style.display = 'none';
    renderCards('', filterZnatoActive, filterUpoActive);
    input.focus();
  });

  filterBtn.addEventListener('click', () => {
    filterZnatoActive = !filterZnatoActive;
    filterBtn.classList.toggle('active', filterZnatoActive);
    filterBtn.textContent = filterZnatoActive ? '✕ Скасувати' : 'Тільки «Знято»';
    renderCards(input.value, filterZnatoActive, filterUpoActive);
  });

  filterUpoBtn.addEventListener('click', () => {
    filterUpoActive = !filterUpoActive;
    filterUpoBtn.classList.toggle('active', filterUpoActive);
    filterUpoBtn.textContent = filterUpoActive ? '✕ УПО' : 'УПО';
    renderCards(input.value, filterZnatoActive, filterUpoActive);
  });

  // init
  totalLabel.textContent = 'із ' + TOTAL;
  countEl.textContent = TOTAL;
  renderCards('', false, false);
